<!DOCTYPE html>
<html>
<head>
  <title>Game</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding-top: 50px;
      background: #f0f8ff;
    }

    button {
      padding: 15px 25px;
      font-size: 20px;
      margin: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>🎮 Math Game</h1>
<p>What is 2 + 2?</p>

<button onclick="checkAnswer(4)">4</button>
<button onclick="checkAnswer(3)">3</button>
<button onclick="checkAnswer(5)">5</button>

<p id="result"></p>

<br><br>

<!-- Back Button -->
<a href="index.html">
  <button>⬅ Back to Slides</button>
</a>

<script>
function checkAnswer(answer) {
  if (answer === 4) {
    document.getElementById("result").innerText = "✅ Correct!";
  } else {
    document.getElementById("result").innerText = "❌ Try again!";
  }
}
</script>

</body>
</html>
